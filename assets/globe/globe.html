<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Travel Globe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas {
            display: block;
        }
        .globe-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            transform: translate(-50%, -50%);
            z-index: 100;
            /* NO transition - prevents lag */
        }
        .globe-label.hidden {
            opacity: 0;
            visibility: hidden;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            z-index: 1000;
        }
        .visited-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #22C55E;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
            pointer-events: none;
            z-index: 50;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div id="canvas-container">
        <div id="loading">Loading globe...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Globe configuration
        const globeRadius = 150;
        let cameraDistance = 380; // Start zoomed out to see full globe
        let targetZoom = 1.0;
        let zoomLevel = 1.0;
        
        // Rotation state
        let rotationX = 0;
        let rotationY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let velocityX = 0;
        let velocityY = 0;
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let autoRotate = false;
        
        // Touch handling
        let initialPinchDistance = 0;
        let lastTouchX = 0;
        let lastTouchY = 0;

        // Continent labels with positions
        const continentLabels = [
            { name: 'NORTH AMERICA', lat: 45, lng: -100 },
            { name: 'SOUTH AMERICA', lat: -15, lng: -60 },
            { name: 'EUROPE', lat: 50, lng: 10 },
            { name: 'AFRICA', lat: 5, lng: 20 },
            { name: 'ASIA', lat: 45, lng: 90 },
            { name: 'AUSTRALIA', lat: -25, lng: 135 },
        ];

        // Visited places
        let visitedPlaces = [];

        // Three.js setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 2 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Create Earth globe
        const earthGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
        
        // Earth texture with gradient
        const canvas2d = document.createElement('canvas');
        canvas2d.width = 1024;
        canvas2d.height = 512;
        const ctx = canvas2d.getContext('2d');
        
        // Ocean gradient
        const oceanGradient = ctx.createLinearGradient(0, 0, 0, 512);
        oceanGradient.addColorStop(0, '#1E3A5F');
        oceanGradient.addColorStop(0.5, '#0D47A1');
        oceanGradient.addColorStop(1, '#1E3A5F');
        ctx.fillStyle = oceanGradient;
        ctx.fillRect(0, 0, 1024, 512);
        
        // Add some landmass shapes (simplified)
        ctx.fillStyle = '#2E7D32';
        
        // North America
        ctx.beginPath();
        ctx.ellipse(200, 150, 80, 60, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // South America
        ctx.beginPath();
        ctx.ellipse(280, 320, 40, 70, 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        // Europe
        ctx.beginPath();
        ctx.ellipse(520, 140, 50, 40, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Africa
        ctx.beginPath();
        ctx.ellipse(540, 280, 50, 70, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Asia
        ctx.beginPath();
        ctx.ellipse(700, 160, 100, 60, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Australia
        ctx.beginPath();
        ctx.ellipse(820, 340, 45, 35, 0, 0, Math.PI * 2);
        ctx.fill();
        
        const earthTexture = new THREE.CanvasTexture(canvas2d);
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: earthTexture,
            shininess: 25,
            specular: new THREE.Color(0x333333),
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // Atmosphere glow
        const atmosphereGeometry = new THREE.SphereGeometry(globeRadius * 1.05, 64, 64);
        const atmosphereMaterial = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                    gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity * 0.5;
                }
            `,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            transparent: true,
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        backLight.position.set(-5, -3, -5);
        scene.add(backLight);

        // Create continent label elements
        const labelElements = {};
        continentLabels.forEach(label => {
            const div = document.createElement('div');
            div.className = 'globe-label';
            div.textContent = label.name;
            div.id = `label-${label.name.replace(/\s/g, '-')}`;
            container.appendChild(div);
            labelElements[label.name] = div;
        });

        // Convert lat/lng to screen position - FIXED VERSION
        function latLngToScreen(lat, lng) {
            const latRad = lat * (Math.PI / 180);
            const lngRad = lng * (Math.PI / 180);
            
            // Use EXACT same formula as markers (no negative z, no rotation matrix)
            const x = (globeRadius + 8) * Math.cos(latRad) * Math.cos(-lngRad);
            const y = (globeRadius + 8) * Math.sin(latRad);
            const z = (globeRadius + 8) * Math.cos(latRad) * Math.sin(-lngRad);
            
            const worldPosition = new THREE.Vector3(x, y, z);
            
            // Apply globe rotation
            worldPosition.applyAxisAngle(new THREE.Vector3(1, 0, 0), rotationX);
            worldPosition.applyAxisAngle(new THREE.Vector3(0, 1, 0), rotationY);
            
            const vector = worldPosition.clone();
            vector.project(camera);
            
            const screenX = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const screenY = (vector.y * -0.5 + 0.5) * window.innerHeight;
            
            // Check if on front of globe
            const isVisible = vector.z < 1 && 
                             isFinite(screenX) && isFinite(screenY) &&
                             screenX > -100 && screenX < window.innerWidth + 100 &&
                             screenY > -100 && screenY < window.innerHeight + 100;
            
            return { x: screenX, y: screenY, visible: isVisible, depth: vector.z };
        }

        // Update label positions
        function updateLabels() {
            continentLabels.forEach(label => {
                const pos = latLngToScreen(label.lat, label.lng);
                const element = labelElements[label.name];
                
                if (pos.visible) {
                    element.style.left = pos.x + 'px';
                    element.style.top = pos.y + 'px';
                    element.classList.remove('hidden');
                    // Fade based on depth
                    const opacity = Math.max(0, Math.min(1, 1 - pos.depth * 0.8));
                    element.style.opacity = opacity;
                } else {
                    element.classList.add('hidden');
                }
            });
        }

        // Update camera position with smooth rotation
        function updateCameraPosition() {
            // Use smoothed rotation values
            earth.rotation.x = rotationX;
            earth.rotation.y = rotationY;
            atmosphere.rotation.x = rotationX;
            atmosphere.rotation.y = rotationY;
            
            // Clamp camera distance for safety
            cameraDistance = Math.max(180, Math.min(550, cameraDistance));
            camera.position.set(0, 0, cameraDistance);
            camera.lookAt(0, 0, 0);
        }

        // Event handlers
        function onMouseDown(e) {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
            velocityX = 0;
            velocityY = 0;
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;
            
            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;
            targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            
            velocityX = deltaY * 0.005;
            velocityY = deltaX * 0.005;
            
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onWheel(e) {
            e.preventDefault();
            // Use targetZoom for smooth zoom
            targetZoom -= e.deltaY * 0.001;
            targetZoom = Math.max(0.6, Math.min(2.5, targetZoom));
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                velocityX = 0;
                velocityY = 0;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            
            if (e.touches.length === 1 && isDragging) {
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;
                
                targetRotationY += deltaX * 0.005;
                targetRotationX += deltaY * 0.005;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
                
                velocityX = deltaY * 0.005;
                velocityY = deltaX * 0.005;
                
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (initialPinchDistance > 0) {
                    const scale = distance / initialPinchDistance;
                    // Use targetZoom with safe bounds
                    targetZoom *= scale;
                    targetZoom = Math.max(0.6, Math.min(2.5, targetZoom));
                    initialPinchDistance = distance;
                }
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length === 0) {
                isDragging = false;
            }
            initialPinchDistance = 0;
        }

        // Add event listeners
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', onMouseUp);
        renderer.domElement.addEventListener('mouseleave', onMouseUp);
        renderer.domElement.addEventListener('wheel', onWheel, { passive: false });
        renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
        renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
        renderer.domElement.addEventListener('touchend', onTouchEnd);

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Apply inertia when not dragging
            if (!isDragging) {
                velocityX *= 0.92;
                velocityY *= 0.92;
                targetRotationX += velocityX;
                targetRotationY += velocityY;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            }
            
            // Auto rotation
            if (autoRotate && !isDragging) {
                targetRotationY += 0.002;
            }
            
            // Smooth interpolation for rotation
            rotationX += (targetRotationX - rotationX) * 0.08;
            rotationY += (targetRotationY - rotationY) * 0.08;
            
            // Smooth interpolation for zoom
            zoomLevel += (targetZoom - zoomLevel) * 0.1;
            cameraDistance = 380 / zoomLevel;
            
            updateCameraPosition();
            updateLabels();
            renderer.render(scene, camera);
        }

        // Hide loading
        document.getElementById('loading').style.display = 'none';
        
        // Start animation
        animate();

        // API for Flutter
        window.addVisitedPlaces = function(places) {
            visitedPlaces = places;
            // Could add markers here
        };

        window.setAutoRotate = function(enabled) {
            autoRotate = enabled;
        };

        window.resetCamera = function() {
            targetRotationX = 0;
            targetRotationY = 0;
            targetZoom = 1.0;
            cameraDistance = 380;
        };
    </script>
</body>
</html>
