<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Travel Globe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative; /* anchor for CSS2DRenderer overlay */
        }
        canvas {
            display: block;
        }
        /* CSS2DRenderer handles position/transform — we only define visual styling here */
        /* Base label — all labels share this */
        .globe-label {
            color: #ffffff;
            pointer-events: none;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.6);
        }
        /* Country labels — uppercase, letter-spaced (Apple Maps style) */
        .globe-label.country       { text-transform: uppercase; letter-spacing: 0.8px; }
        .globe-label.country.imp3  { font-size: 14px; font-weight: 700; }
        .globe-label.country.imp2  { font-size: 12px; font-weight: 600; letter-spacing: 0.6px; }
        .globe-label.country.imp1  { font-size: 10px; font-weight: 500; letter-spacing: 0.4px; }
        /* City labels — sentence case, smaller */
        .globe-label.city          { text-transform: none; letter-spacing: 0; }
        .globe-label.city.imp3     { font-size: 13px; font-weight: 600; }
        .globe-label.city.imp2     { font-size: 11px; font-weight: 500; }
        .globe-label.city.imp1     { font-size: 10px; font-weight: 400; }
        /* Island/territory labels */
        .globe-label.island        { font-size: 9px; font-weight: 400; letter-spacing: 0; text-transform: none; }
        /* Continent labels — large, prominent, shown only at full zoom-out */
        .globe-label.continent     { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.95); }
        /* Ocean labels — italic, light blue tint, wide letter-spacing */
        .globe-label.ocean         { font-size: 11px; font-weight: 400; font-style: italic; text-transform: uppercase; letter-spacing: 2.5px; color: rgba(160,210,255,0.80); }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            z-index: 1000;
        }
        .visited-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #22C55E;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
            pointer-events: none;
            z-index: 50;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>

        // ── Day / Night Live Shader ───────────────────────────────────────────────
        // The earth uses a ShaderMaterial that blends between a day texture and a
        // city-lights night texture based on the real-time position of the sun.
        // Sun position is recomputed every frame from UTC time (moves ~0.004°/frame
        // at 60fps — imperceptible, but the terminator is always accurate).
        // ─────────────────────────────────────────────────────────────────────────
        const earthGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
        const textureLoader = new THREE.TextureLoader();

        function makeBlankTex(hex) {
            const c = document.createElement('canvas');
            c.width = 2; c.height = 1;
            c.getContext('2d').fillStyle = hex;
            c.getContext('2d').fillRect(0, 0, 2, 1);
            return new THREE.CanvasTexture(c);
        }

        const earthMaterial = new THREE.ShaderMaterial({
            uniforms: {
                dayTexture:   { value: makeBlankTex('#0D47A1') }, // dark blue until loaded
                nightTexture: { value: makeBlankTex('#000005') }, // near-black until city lights load
                sunDirection: { value: new THREE.Vector3(1, 0, 0) },
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vWorldNormal;
                void main() {
                    vUv = uv;
                    // World-space normal so sun direction comparison is rotation-independent
                    vWorldNormal = normalize(mat3(modelMatrix) * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D dayTexture;
                uniform sampler2D nightTexture;
                uniform vec3 sunDirection;
                varying vec2 vUv;
                varying vec3 vWorldNormal;
                void main() {
                    float cosAngle = dot(normalize(vWorldNormal), normalize(sunDirection));
                    // Smooth terminator — 24° twilight band
                    float dayMix = smoothstep(-0.2, 0.2, cosAngle);
                    vec4 day   = texture2D(dayTexture, vUv);
                    vec4 night = texture2D(nightTexture, vUv) * 1.8; // boost city lights
                    gl_FragColor = mix(night, day, dayMix);
                }
            `,
        });

        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // Computes current real-world sun direction as a normalised 3D vector
        // using the same coordinate system as latLngToSphere().
        function getSunDirectionWorld() {
            const now = new Date();
            const dayOfYear = Math.floor(
                (now - new Date(Date.UTC(now.getUTCFullYear(), 0, 0))) / 864e5
            );
            // Solar declination — angle of sun above/below equator (±23.45°)
            const decl = -23.45 * Math.cos(2 * Math.PI * (dayOfYear + 10) / 365) * Math.PI / 180;
            // Sub-solar longitude — the point where the sun is directly overhead
            const lng  = (12 - (now.getUTCHours() + now.getUTCMinutes() / 60)) * 15;
            const phi   = (Math.PI / 2) - decl;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -Math.sin(phi) * Math.cos(theta),
                 Math.cos(phi),
                 Math.sin(phi) * Math.sin(theta)
            );
        }

        function applyTextureSettings(tex) {
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            tex.minFilter  = THREE.LinearMipmapLinearFilter;
            tex.magFilter  = THREE.LinearFilter;
            tex.needsUpdate = true;
        }

        // Load city-lights night texture from CDN (non-blocking)
        textureLoader.load(
            'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/earth-night.jpg',
            function(nightTex) {
                applyTextureSettings(nightTex);
                earthMaterial.uniforms.nightTexture.value = nightTex;
            }
        );

        window.setEarthTexture = function(dataUrl) {
            textureLoader.load(dataUrl, function(bundledTex) {
                applyTextureSettings(bundledTex);
                earthMaterial.uniforms.dayTexture.value = bundledTex;
            });
            // Attempt to upgrade to high-res CDN texture in the background
            const hiResUrls = [
                'https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57752/land_shallow_topo_8192.jpg',
                'https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57752/land_shallow_topo_2048.jpg',
                'https://cdn.jsdelivr.net/npm/three-globe@2.31.0/example/img/earth-day.jpg',
            ];
            (function tryNext(i) {
                if (i >= hiResUrls.length) return;
                textureLoader.load(
                    hiResUrls[i],
                    function(tex) { applyTextureSettings(tex); earthMaterial.uniforms.dayTexture.value = tex; },
                    undefined,
                    function() { tryNext(i + 1); }
                );
            })(0);
        };

        // Convert lat/lng to a 3D point on a sphere of given radius.
        // Used for both border geometry AND label attachment points — same formula.
        function latLngToSphere(lat, lng, r) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                 r * Math.cos(phi),
                 r * Math.sin(phi) * Math.sin(theta)
            );
        }

        function lngLatToVector3(lng, lat) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            const x = -borderRadius * Math.sin(phi) * Math.cos(theta);
            const y = borderRadius * Math.cos(phi);
            const z = borderRadius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }

        const tripRadius = globeRadius * 1.003;

        function surfacePointForTrip(lat, lng) {
            const base = lngLatToVector3(lng, lat);
            const scale = tripRadius / borderRadius;
            return base.multiplyScalar(scale);

        function clearTrip() {
            while (tripGroup.children.length > 0) {
                const obj = tripGroup.children.pop();
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material && !obj.material.isShaderMaterial) obj.material.dispose();
            }

        // ── Mood colour palette ───────────────────────────────────────────────────
        const MOOD_COLORS = {
            happy: 0xFFD600, adventurous: 0xFF5252, relaxed: 0x4DD0E1,
            energetic: 0x29B6F6, romantic: 0xFF4081, social: 0xFFD54F,
            cultural: 0x7E57C2, curious: 0xFF7043, cozy: 0xEF5350,

            okay: 0x94A3B8, thoughtful: 0x6366F1, chill: 0x12B347,
            // Fallbacks for old data
            joyful: 0xFFD600, sad: 0x42A5F5, anxious: 0xAB47BC,
            stressed: 0xAB47BC, love: 0xFF4081, nostalgic: 0xFF7043,
            peaceful: 0x4DD0E1, calm: 0x4DD0E1
        };
        function moodColor(mood) {
            return MOOD_COLORS[(mood || '').toLowerCase()] || 0xFFFFFF;

        // Marker groups — one per visited place, stored for raycasting
        const markerMeshes = []; // { mesh, placeData }

        function buildTripVisualization() {
            clearTrip();
            markerMeshes.length = 0;
            if (!visitedPlaces || visitedPlaces.length === 0) return;

            visitedPlaces.forEach(function(p, i) {
                if (typeof p.lat !== 'number' || typeof p.lng !== 'number') return;
                const pos = surfacePointForTrip(p.lat, p.lng);
                const col = moodColor(p.mood);

                // Outer glow sphere (semi-transparent)
                const glowMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(3.2, 16, 16),
                    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.25 })
                );
                glowMesh.position.copy(pos);
                tripGroup.add(glowMesh);

                // Inner solid core
                const coreMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(1.8, 16, 16),
                    new THREE.MeshBasicMaterial({ color: col })
                );
                coreMesh.position.copy(pos);
                coreMesh._placeIndex = i; // used by raycaster
                tripGroup.add(coreMesh);

                markerMeshes.push({ core: coreMesh, glow: glowMesh, placeData: p });
            });
        }

        // ── Tap detection ─────────────────────────────────────────────────────────
        const _raycaster = new THREE.Raycaster();
        _raycaster.params.Mesh.threshold = 2;
        let _tapStartX = 0, _tapStartY = 0;

        function handleGlobeTap(clientX, clientY) {
            if (markerMeshes.length === 0) return;
            const ndcX = (clientX / window.innerWidth)  *  2 - 1;
            const ndcY = (clientY / window.innerHeight) * -2 + 1;
            _raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
            const coreMeshes = markerMeshes.map(function(m) { return m.core; });
            const hits = _raycaster.intersectObjects(coreMeshes);
            if (hits.length > 0) {
                const idx = hits[0].object._placeIndex;
                const place = visitedPlaces[idx];
                if (place && typeof WanderMoodChannel !== 'undefined') {
                    WanderMoodChannel.postMessage(JSON.stringify({
                        type: 'markerTap',
                        place: place,
                    }));
                }
            }
        }

        // Pulse animation for glow spheres (runs in animate loop)
        let _pulseT = 0;
        function pulseMarkers() {
            _pulseT += 0.04;
            const scale = 1 + 0.25 * Math.sin(_pulseT);
            markerMeshes.forEach(function(m) { m.glow.scale.setScalar(scale); });
        }

        function addBordersFromGeoJSON(geojson) {
            const points = [];
            const features = geojson.features || [];
            features.forEach(function(f) {
                const geom = f.geometry;
                if (!geom) return;
                const coords = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
                coords.forEach(function(poly) {
                    const rings = Array.isArray(poly[0][0]) ? poly : [poly];
                    rings.forEach(function(ring) {
                        for (let i = 0; i < ring.length - 1; i++) {
                            const a = ring[i], b = ring[i + 1];
                            const v1 = lngLatToVector3(a[0], a[1]);
                            const v2 = lngLatToVector3(b[0], b[1]);
                            points.push(v1.x, v1.y, v1.z, v2.x, v2.y, v2.z);
                        }
                    });
                });
            });
            if (points.length === 0) return;
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            geometry.computeBoundingSphere();
            const line = new THREE.LineSegments(geometry, new THREE.LineBasicMaterial({
                color: 0xffffff,
                opacity: 0.35,
                transparent: true,
            }));
            bordersGroup.add(line);
        }

        // 50m resolution includes small islands (Curaçao, Aruba, etc.) unlike 110m
        fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson')
            .then(function(r) { return r.json(); })
            .then(addBordersFromGeoJSON)
            .catch(function() { /* no borders if fetch fails */ });

        // Atmosphere glow
        const atmosphereGeometry = new THREE.SphereGeometry(globeRadius * 1.05, 64, 64);
        const atmosphereMaterial = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                void main() {
                    float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                    gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity * 0.5;
                }
            `,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending,
            transparent: true,
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        backLight.position.set(-5, -3, -5);
        scene.add(backLight);

        // Label importance: bigger = more likely to show when zoomed out
        const labelImportance = {
            // Continents / very large or popular countries
            'United States': 3,
            'Canada': 3,
            'Mexico': 2,
            'Brazil': 3,
            'Argentina': 2,
            'Chile': 2,
            'United Kingdom': 3,
            'Ireland': 2,
            'France': 3,
            'Germany': 3,
            'Spain': 3,
            'Portugal': 2,
            'Italy': 3,
            'Netherlands': 2,
            'Belgium': 2,
            'Switzerland': 2,
            'Austria': 2,
            'Greece': 2,
            'Turkey': 2,
            'Russia': 3,
            'Norway': 2,
            'Sweden': 2,
            'Finland': 2,
            'Poland': 2,
            'Czech Republic': 1,
            'Hungary': 1,
            'Romania': 1,
            'Ukraine': 2,
            'China': 3,
            'Japan': 3,
            'India': 3,
            'Indonesia': 2,
            'Thailand': 2,
            'Vietnam': 2,
            'Philippines': 2,
            'Saudi Arabia': 2,
            'United Arab Emirates': 2,
            'South Africa': 3,
            'Nigeria': 2,
            'Kenya': 2,
            'Egypt': 3,
            'Morocco': 2,
            'Australia': 3,
            'New Zealand': 2,

            // Major cities
            'New York': 3,
            'Los Angeles': 2,
            'Chicago': 2,
            'Houston': 1,
            'Miami': 2,
            'San Francisco': 2,
            'Washington': 2,
            'Toronto': 2,
            'Vancouver': 2,
            'Montreal': 2,
            'Mexico City': 2,
            'London': 3,
            'Manchester': 1,
            'Paris': 3,
            'Lyon': 1,
            'Berlin': 2,
            'Munich': 2,
            'Madrid': 2,
            'Barcelona': 2,
            'Rome': 2,
            'Milan': 2,
            'Amsterdam': 2,
            'Brussels': 2,
            'Vienna': 2,
            'Warsaw': 2,
            'Moscow': 3,
            'St Petersburg': 2,
            'Cairo': 3,
            'Johannesburg': 2,
            'Cape Town': 2,
            'Lagos': 2,
            'Nairobi': 2,
            'Beijing': 3,
            'Shanghai': 3,
            'Hong Kong': 3,
            'Guangzhou': 1,
            'Tokyo': 3,
            'Osaka': 2,
            'Kyoto': 2,
            'Delhi': 3,
            'Mumbai': 3,
            'Bangalore': 2,
            'Sydney': 3,
            'Melbourne': 2,
            'Jakarta': 2,
            'Bangkok': 3,
            'Singapore': 3,
            'Seoul': 3,
            'Dubai': 3,
            'Riyadh': 2,
            'Tehran': 2,
            'Baghdad': 2,
            'Jerusalem': 2,
            'Athens': 2,
            'Lisbon': 2,
            'Dublin': 2,
            'Stockholm': 2,
            'Oslo': 2,
            'Helsinki': 2,
            'Copenhagen': 2,
            'Prague': 2,
            'Budapest': 2,
            'Bucharest': 2,
            'Kiev': 2,
            'Santiago': 2,
            'Lima': 2,
            'Bogotá': 2,
            'Caracas': 2,
            'Havana': 2
        };

        // Build label data list
        const allLabelData = [];
        countryLabels.forEach(function(l) {
            allLabelData.push({ name: l.name, lat: l.lat, lng: l.lng, isCity: false, importance: labelImportance[l.name] || 1 });
        });
        cityLabels.forEach(function(l) {
            allLabelData.push({ name: l.name, lat: l.lat, lng: l.lng, isCity: true, importance: labelImportance[l.name] || 1 });
        });
        islandLabels.forEach(function(l) {
            allLabelData.push({ name: l.name, lat: l.lat, lng: l.lng, isCity: true, isIsland: true, minZoom: l.minZoom, importance: 2 });
        });
        continentLabels.forEach(function(l) {
            allLabelData.push({ name: l.name, lat: l.lat, lng: l.lng, isContinent: true, maxZoom: 1.25, importance: 4 });
        });
        oceanLabels.forEach(function(l) {
            allLabelData.push({ name: l.name, lat: l.lat, lng: l.lng, isOcean: true, maxZoom: 2.5, importance: 3 });
        });

        // Create CSS2DObjects and attach them as children of the earth mesh.
        // Because they are children of earth, Three.js applies earth's rotation to their
        // world matrix automatically — labels are truly anchored to the globe surface.
        allLabelData.forEach(function(d) {
            const div = document.createElement('div');
            const imp = d.importance || 1;
            const impClass = ' imp' + Math.min(imp, 3);
            if (d.isContinent) {
                div.className = 'globe-label continent';
            } else if (d.isOcean) {
                div.className = 'globe-label ocean';
            } else if (d.isIsland) {
                div.className = 'globe-label city island';
            } else if (d.isCity) {
                div.className = 'globe-label city' + impClass;
            } else {
                div.className = 'globe-label country' + impClass;
            }
            div.textContent = d.name;
            div.style.visibility = 'hidden'; // hidden until visibility pass

            const labelObject = new THREE.CSS2DObject(div);
            // Place label 2 units above globe surface to avoid z-fighting
            const pos = latLngToSphere(d.lat, d.lng, globeRadius + 2);
            labelObject.position.set(pos.x, pos.y, pos.z);
            earth.add(labelObject); // rotates with the globe automatically

            d.labelDiv = div;
            d.labelObject = labelObject;
        });

        // Small island nations only visible when zoomed in (avoids labels floating over ocean)
        const smallCountries = new Set(['Cape Verde', 'Maldives', 'Comoros', 'Seychelles', 'Mauritius',
            'Antigua and Barbuda', 'Saint Kitts and Nevis', 'Saint Lucia', 'Saint Vincent and the Grenadines',
            'Dominica', 'Grenada', 'Barbados', 'Bahamas', 'Palau', 'Nauru', 'Tuvalu', 'Kiribati',
            'Marshall Islands', 'Micronesia', 'Samoa', 'Tonga', 'Vanuatu', 'Solomon Islands']);

        // Reusable vector to avoid allocations in the hot path
        const _labelWorldPos = new THREE.Vector3();
        const _labelProjPos = new THREE.Vector3();

        // Show/hide each label based on:
        // 1. Whether its surface normal faces the camera (back-face culling)
        // 2. Zoom-based importance filtering
        // 3. Screen-space decluttering (no overlapping labels)
        // Position is handled entirely by CSS2DRenderer + Three.js scene graph.
        // Large countries always show their label even at deep zoom for orientation
        const LARGE_COUNTRIES = new Set(['Russia', 'Canada', 'United States', 'China', 'Brazil',
            'Australia', 'India', 'Argentina', 'Kazakhstan', 'Algeria', 'Sudan', 'Greenland']);

        function updateLabelVisibility() {
            const z = zoomLevel;

            // ── Zoom progression ──────────────────────────────────────────────────────
            // Tier 1  z < 1.4   Global:      continents + oceans ONLY
            // Tier 2  z < 1.9   Continental: major countries (imp≥2) + world capitals
            // Tier 3  z < 2.8   Country:     all countries + major cities + some islands
            // Tier 4  z < 4.2   Regional:    medium countries + all cities + islands
            // Tier 5  z ≥ 4.2   City view:   landmark countries only + all cities + islands
            // ──────────────────────────────────────────────────────────────────────────
            const continentOnlyMode = z < 1.4; // hard block on ALL country + city labels
            let minCountryImp, minCityImp, showIslands, showSmallCountries;
            if (continentOnlyMode) {
                minCountryImp = 99; minCityImp = 99; showIslands = false; showSmallCountries = false;
            } else if (z < 1.9) {
                minCountryImp = 2;  minCityImp = 3;  showIslands = false; showSmallCountries = false;
            } else if (z < 2.8) {
                minCountryImp = 1;  minCityImp = 2;  showIslands = true;  showSmallCountries = false;
            } else if (z < 4.2) {
                minCountryImp = 2;  minCityImp = 1;  showIslands = true;  showSmallCountries = true;
            } else {
                minCountryImp = 99; minCityImp = 1;  showIslands = true;  showSmallCountries = true;
            }
            // Landmark countries (Russia, US, etc.) show for orientation — but NOT in continent-only mode
            const showLandmark = !continentOnlyMode && z < 5.0;

            // Declutter distances shrink as you zoom so more labels fit on screen
            const minDistCountry = z > 2 ? 40 : 55;
            const minDistCity    = z > 4 ? 12 : z > 2.5 ? 18 : z > 1.6 ? 26 : 38;
            const minDistIsland  = z > 4 ? 8  : z > 2.5 ? 12 : 18;

            const candidates = [];

            allLabelData.forEach(function(d) {
                const importance = d.importance || 1;

                // minZoom / maxZoom gates
                if (d.minZoom && z < d.minZoom) { d.labelDiv.style.visibility = 'hidden'; return; }
                if (d.maxZoom && z > d.maxZoom) { d.labelDiv.style.visibility = 'hidden'; return; }

                if (d.isContinent || d.isOcean) {
                    // Continents/oceans: only the maxZoom gate above controls them.
                } else if (!d.isCity) {
                    // Country label visibility
                    const isLandmark = LARGE_COUNTRIES.has(d.name);
                    const isSmall    = smallCountries.has(d.name);
                    if (isSmall && !showSmallCountries) { d.labelDiv.style.visibility = 'hidden'; return; }
                    if (isLandmark && showLandmark) {
                        // Landmark countries always pass importance gate
                    } else if (importance < minCountryImp) {
                        d.labelDiv.style.visibility = 'hidden'; return;
                    }
                } else if (d.isIsland) {
                    if (!showIslands) { d.labelDiv.style.visibility = 'hidden'; return; }
                } else {
                    // City label visibility
                    if (importance < minCityImp) { d.labelDiv.style.visibility = 'hidden'; return; }
                }

                // Back-face culling: hide labels on back of globe or near limb
                d.labelObject.getWorldPosition(_labelWorldPos);
                const nx = _labelWorldPos.x / globeRadius;
                const ny = _labelWorldPos.y / globeRadius;
                const nz = _labelWorldPos.z / globeRadius;
                const toCamZ   = baseCameraDistance - _labelWorldPos.z;
                const toCamLen = Math.sqrt(_labelWorldPos.x * _labelWorldPos.x +
                                           _labelWorldPos.y * _labelWorldPos.y +
                                           toCamZ * toCamZ);
                const facing = (nx * (-_labelWorldPos.x / toCamLen) +
                                ny * (-_labelWorldPos.y / toCamLen) +
                                nz * (toCamZ / toCamLen));
                if (facing < 0.2) { d.labelDiv.style.visibility = 'hidden'; return; }

                // Project to screen for declutter
                _labelProjPos.copy(_labelWorldPos).project(camera);
                d._sx = (_labelProjPos.x * 0.5 + 0.5) * window.innerWidth;
                d._sy = (-_labelProjPos.y * 0.5 + 0.5) * window.innerHeight;
                d._facing = facing;
                candidates.push(d);
            });

            // Higher importance labels claim screen space first
            candidates.sort(function(a, b) { return (b.importance || 1) - (a.importance || 1); });

            const placed = [];
            candidates.forEach(function(d) {
                const minDist = (d.isContinent || d.isOcean) ? 70
                              : d.isIsland ? minDistIsland
                              : d.isCity   ? minDistCity
                              : minDistCountry;
                const hasConflict = placed.some(function(p) {
                    const dx = p.x - d._sx, dy = p.y - d._sy;
                    return dx * dx + dy * dy < minDist * minDist;
                });

                if (hasConflict) {
                    d.labelDiv.style.visibility = 'hidden';
                    return;
                }

                placed.push({ x: d._sx, y: d._sy });
                d.labelDiv.style.visibility = 'visible';
                // Fade labels near the limb for a natural look
                d.labelDiv.style.opacity = Math.min(1.0, (d._facing - 0.2) / 0.35).toFixed(2);
            });
        }

        // Update camera position with smooth rotation
        function updateCameraPosition() {
            // Use smoothed rotation values
            earth.rotation.x = rotationX;
            earth.rotation.y = rotationY;
            atmosphere.rotation.x = rotationX;
            atmosphere.rotation.y = rotationY;
            bordersGroup.rotation.x = rotationX;
            bordersGroup.rotation.y = rotationY;
            tripGroup.rotation.x = rotationX;
            tripGroup.rotation.y = rotationY;

            // Camera stays fixed — zoom is done by narrowing FOV so the entire scene
            // (globe + labels) scales uniformly. Labels stay perfectly pinned to countries.
            camera.position.set(0, 0, baseCameraDistance);
            camera.fov = 45 / zoomLevel;
            camera.updateProjectionMatrix();
            camera.lookAt(0, 0, 0);
        }

        // Event handlers
        function onMouseDown(e) {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
            _tapStartX = e.clientX;
            _tapStartY = e.clientY;
            velocityX = 0;
            velocityY = 0;
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;
            // Scale sensitivity inversely with zoom: more zoomed in = slower rotation
            const sens = 0.005 / Math.max(1, zoomLevel);
            
            targetRotationY += deltaX * sens;
            targetRotationX += deltaY * sens;
            targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            
            velocityX = deltaY * sens;
            velocityY = deltaX * sens;
            
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        }

        function onMouseUp(e) {
            // Fire tap on click if barely moved (simulator / desktop testing)
            const dx = e.clientX - (_tapStartX || e.clientX);
            const dy = e.clientY - (_tapStartY || e.clientY);
            if (Math.sqrt(dx * dx + dy * dy) < 8) {
                handleGlobeTap(e.clientX, e.clientY);
            }
            isDragging = false;
        }

        function onWheel(e) {
            e.preventDefault();
            // Use targetZoom for smooth zoom
            targetZoom -= e.deltaY * 0.001;
            targetZoom = Math.max(0.6, Math.min(6.0, targetZoom));
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                _tapStartX = e.touches[0].clientX;
                _tapStartY = e.touches[0].clientY;
                velocityX = 0;
                velocityY = 0;
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            
            if (e.touches.length === 1 && isDragging) {
                const deltaX = e.touches[0].clientX - lastTouchX;
                const deltaY = e.touches[0].clientY - lastTouchY;
                // Scale sensitivity inversely with zoom: more zoomed in = slower rotation
                const sens = 0.005 / Math.max(1, zoomLevel);
                
                targetRotationY += deltaX * sens;
                targetRotationX += deltaY * sens;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
                
                velocityX = deltaY * sens;
                velocityY = deltaX * sens;
                
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (initialPinchDistance > 0) {
                    const scale = distance / initialPinchDistance;
                    // Use targetZoom with safe bounds
                    targetZoom *= scale;
                    targetZoom = Math.max(0.6, Math.min(6.0, targetZoom));
                    initialPinchDistance = distance;
                }
            }
        }

        function onTouchEnd(e) {
            if (e.touches.length === 0) {
                // Fire tap only if finger barely moved (not a drag)
                if (e.changedTouches.length > 0) {
                    const dx = e.changedTouches[0].clientX - _tapStartX;
                    const dy = e.changedTouches[0].clientY - _tapStartY;
                    if (Math.sqrt(dx * dx + dy * dy) < 8) {
                        handleGlobeTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    }
                }
                isDragging = false;
            }
            initialPinchDistance = 0;
        }

        // Add event listeners
        renderer.domElement.addEventListener('mousedown', onMouseDown);
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('mouseup', onMouseUp);
        renderer.domElement.addEventListener('mouseleave', onMouseUp);
        renderer.domElement.addEventListener('wheel', onWheel, { passive: false });
        renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
        renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
        renderer.domElement.addEventListener('touchend', onTouchEnd);

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            css2dRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Apply inertia when not dragging.
            // Decay faster when zoomed in so the globe doesn't over-spin on small details.
            if (!isDragging) {
                const inertiaDamping = zoomLevel > 2 ? 0.80 : 0.92;
                velocityX *= inertiaDamping;
                velocityY *= inertiaDamping;
                targetRotationX += velocityX;
                targetRotationY += velocityY;
                targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
            }
            
            // Auto rotation
            if (autoRotate && !isDragging) {
                targetRotationY += 0.002;
            }
            
            // Smooth interpolation for rotation
            rotationX += (targetRotationX - rotationX) * 0.08;
            rotationY += (targetRotationY - rotationY) * 0.08;
            
            // Smooth interpolation for zoom (FOV-based; camera stays fixed)
            zoomLevel += (targetZoom - zoomLevel) * 0.1;
            
            // Update live day/night terminator
            earthMaterial.uniforms.sunDirection.value.copy(getSunDirectionWorld());

            // Pulse glow on mood markers
            pulseMarkers();

            updateCameraPosition();
            updateLabelVisibility();
            renderer.render(scene, camera);
            css2dRenderer.render(scene, camera);
        }

        // Hide loading
        document.getElementById('loading').style.display = 'none';
        
        // Start animation
        animate();

        // API for Flutter
        window.addVisitedPlaces = function(places) {
            visitedPlaces = Array.isArray(places) ? places : [];
            buildTripVisualization();
        };

        window.setAutoRotate = function(enabled) {
            autoRotate = enabled;
        };

        window.resetCamera = function() {
            targetRotationX = 0.35;  // back to Atlantic default
            targetRotationY = -0.95;
            targetZoom = 1.0;
        };

        // Centre the globe on a lat/lng — called from Dart with the user's location.
        // Derives the exact Two-step Euler rotation (XYZ order) so the given point
        // faces the camera precisely, then animates there via the existing interpolation.
        window.setInitialLocation = function(lat, lng) {
            // Convert lat/lng to local sphere unit vector
            const phi   = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            const lx = -Math.sin(phi) * Math.cos(theta);
            const ly =  Math.cos(phi);
            const lz =  Math.sin(phi) * Math.sin(theta);

            // Step 1: rotX that zeroes the y component after Rx rotation
            const newRotX = Math.atan2(ly, lz);
            // Step 2: rotY that zeroes the x component after Ry rotation
            const zp      = Math.sqrt(ly * ly + lz * lz);
            const newRotY = Math.atan2(-lx, zp);

            // Clamp rotX to avoid flipping past the poles
            const clampedRotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, newRotX));

            // Take the shortest angular path for rotY to avoid spinning the long way
            let dy = newRotY - targetRotationY;
            while (dy >  Math.PI) dy -= 2 * Math.PI;
            while (dy < -Math.PI) dy += 2 * Math.PI;

            targetRotationX = clampedRotX;
            targetRotationY = targetRotationY + dy;
            // Don't reset zoom — keep wherever user was
        };
    </script>
